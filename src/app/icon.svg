<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0A0A0A"/>

  <!-- Glow background behind siren -->
  <ellipse cx="50" cy="52" rx="32" ry="28" fill="#FF450014" />

  <!-- Siren base/stand -->
  <rect x="27" y="68" width="46" height="11" rx="5.5" fill="#2F2F2F"/>

  <!-- Siren dome body (red) -->
  <path d="M32 68 C32 46 38 26 50 26 C62 26 68 46 68 68 Z" fill="#E53935"/>

  <!-- Inner dome highlight -->
  <path d="M38 68 C38 50 42 34 50 30 C50 30 56 44 56 68 Z" fill="#FF5252" opacity="0.45"/>

  <!-- Center light beam (white vertical) -->
  <line x1="50" y1="35" x2="50" y2="63" stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Top glow dot -->
  <circle cx="50" cy="29" r="5" fill="white" opacity="0.95"/>
  <circle cx="50" cy="29" r="9" fill="#FF4500" opacity="0.3"/>

  <!-- Left rays -->
  <line x1="33" y1="49" x2="17" y2="40" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="30" y1="60" x2="13" y2="60" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Right rays -->
  <line x1="67" y1="49" x2="83" y2="40" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="70" y1="60" x2="87" y2="60" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Outer red glow ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#FF4500" stroke-width="1" opacity="0.25"/>
</svg>
